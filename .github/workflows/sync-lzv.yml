name: Sync LZV results

on:
  schedule:
    # Sunday 06:00 UTC (~07:00 Brussels winter, 08:00 summer)
    - cron: "0 6 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install runtime deps
        run: npm install --omit=dev --no-audit --no-fund @supabase/supabase-js

      - name: Run sync script
        run: node scripts/sync-lzv.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LZV_TEAM_URL: ${{ vars.LZV_TEAM_URL || 'https://www.lzvcup.be/teams/overview/742' }}
