name: Sync LZV results

on:
  schedule:
    # Sunday 06:00 UTC (~07:00 Brussels winter, 08:00 summer)
    - cron: "0 6 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Opt into Node 24 for JS-based actions until v6+ is default everywhere (GitHub deprecation notice).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install runtime deps
        run: npm install --omit=dev --no-audit --no-fund @supabase/supabase-js

      - name: Run sync script
        run: node scripts/sync-lzv.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LZV_TEAM_URL: ${{ vars.LZV_TEAM_URL || 'https://www.lzvcup.be/teams/overview/742' }}
          LZV_SEASON_SLUG: ${{ vars.LZV_SEASON_SLUG || '2526' }}
